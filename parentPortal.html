<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQRA Parent Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #0284c7; }
        .header { background: #0284c7; color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        
        .stats-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-card { flex: 1; background: #f8fafc; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-card b { font-size: 20px; color: #0284c7; display: block; }
        
        select, input { width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; border: 2px solid #0284c7; box-sizing: border-box; }
        
        .list-card { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #eee; }
        .st-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #0284c7; margin-right: 12px; background: #eee; }
        
        .info { flex-grow: 1; }
        .info b { font-size: 14px; color: #333; }
        .info p { font-size: 11px; color: #666; margin: 2px 0; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .in { background: #dcfce7; color: #166534; }
        .out { background: #fee2e2; color: #991b1b; }
        
        #loading { text-align: center; padding: 10px; color: #0284c7; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0; font-size: 18px;">IQRA PARENT PORTAL</h2>
        <small>Attendance & Records</small>
    </div>

    <div class="stats-box">
        <div class="stat-card"><span>Total Present</span><b id="totalPresent">0</b></div>
        <div class="stat-card"><span>In School</span><b id="currentIn">0</b></div>
    </div>

    <select id="cid" onchange="loadData()">
        <option value="">-- Select Class --</option>
        <option value="1">Class 1</option><option value="2">Class 2</option>
        <option value="3">Class 3</option><option value="4">Class 4</option>
        <option value="5">Class 5</option><option value="6">Class 6</option>
        <option value="7">Class 7</option><option value="8">Class 8</option>
        <option value="9">Class 9</option><option value="10">Class 10</option>
    </select>

    <input type="date" id="attDate" onchange="loadData()">
    <input type="text" id="srch" placeholder="Search student name..." onkeyup="search()">

    <div id="loading">Searching records...</div>
    <div id="mainList"></div>
</div>

<script>
    // === APNA SCRIPT URL YAHAN DALEIN ===
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxyLbmtYzTZi9Rg9geYbZgzQLuQX6N25Rf1t6SQKZ0B_v5YwiZtBoYNMaH3im-uJm8u_g/exec";

    window.onload = () => {
        document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
    };

    async function loadData() {
        let c = document.getElementById('cid').value;
        let d = document.getElementById('attDate').value;
        if(!c) return;
        
        const list = document.getElementById('mainList');
        const loader = document.getElementById('loading');
        list.innerHTML = "";
        loader.style.display = "block";

        try {
            const res = await fetch(`${SCRIPT_URL}?getAttendance=true&classId=${c}&name=all&date=${d}`);
            const data = await res.json();
            
            // Count Logic
            let uniqueNames = [...new Set(data.map(item => item[0]))];
            document.getElementById('totalPresent').innerText = uniqueNames.length;
            document.getElementById('currentIn').innerText = data.filter(item => item[5] === 'IN').length;

            loader.style.display = "none";
            
            if(data.length === 0) {
                list.innerHTML = "<p style='text-align:center; font-size:12px; color:red;'>No records found for this date.</p>";
                return;
            }

            data.forEach(row => {
                // Photo Fix
                let photoUrl = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                if(row[6] && row[6] !== "" && row[6] !== "No Photo") {
                    photoUrl = "https://lh3.googleusercontent.com/d/" + row[6];
                }

                list.innerHTML += `
                    <div class="list-card">
                        <img src="${photoUrl}" class="st-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                        <div class="info">
                            <b>${row[0]}</b>
                            <p>IN: ${row[1]}</p>
                            <p>OUT: ${row[2] === 'Inside' ? 'Still Inside' : row[2]}</p>
                        </div>
                        <span class="badge ${row[5]=='IN'?'in':'out'}">${row[5]}</span>
                    </div>
                `;
            });
        } catch(e) { 
            loader.style.display = "none";
            list.innerHTML = "<p style='text-align:center; color:red;'>Error connecting to server.</p>"; 
        }
    }

    function search() {
        let v = document.getElementById('srch').value.toLowerCase();
        let cards = document.getElementsByClassName('list-card');
        for(let c of cards) {
            c.style.display = c.innerText.toLowerCase().includes(v) ? "flex" : "none";
        }
    }
</script>
</body>
</html>
