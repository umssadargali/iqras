<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQRA Parent Portal - Square Photo History</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e8f5e9; margin: 0; padding: 15px; }
        .main-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 500px; margin: auto; }
        .title { color: #2e7d32; text-align: center; font-weight: bold; margin-bottom: 20px; }
        
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 12px; background: #f9f9f9; font-size: 14px; }
        .btn-check { width: 100%; padding: 12px; background: #4caf50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        /* History Card Design - Square Photo Fix */
        .history-card { 
            background: white; 
            border: 2px solid #4caf50; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }
        .details { flex: 1; padding-right: 10px; }
        .details p { margin: 6px 0; font-size: 14px; color: #333; line-height: 1.4; }
        .details b { color: #000; font-weight: 600; }
        
        /* Bade Square Photo ka style */
        .photo-box { 
            width: 100px; /* Photo ka size badha diya gaya hai */
            height: 100px; 
            border-radius: 5px; /* Square look ke liye radius kam kiya */
            overflow: hidden; 
            border: 2px solid #4caf50; 
            margin-left: 10px;
            flex-shrink: 0;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        #loader { text-align: center; color: #2e7d32; display: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="title">
        <h2 style="margin:0">Iqra Public School</h2>
        <small>Attendance Tracking Portal</small>
    </div>

    <select id="classId" onchange="fetchStudents()">
        <option value="">-- Select Class --</option>
        <option value="1">Class 1</option><option value="2">Class 2</option>
        <option value="3">Class 3</option><option value="4">Class 4</option>
        <option value="5">Class 5</option><option value="6">Class 6</option>
        <option value="7">Class 7</option><option value="8">Class 8</option>
        <option value="9">Class 9</option><option value="10">Class 10</option>
    </select>

    <select id="studentId" disabled>
        <option value="">-- Select Student --</option>
    </select>

    <button class="btn-check" onclick="loadHistory()">Check Attendance</button>

    <div id="loader">Fetching Records...</div>
    <div id="historyContainer"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyG8gPVe7--mpBGMTFyLyYrdyx9KqTWOIV4peyC20aK9Kh8wAXyeQi8aos6-8AEqQFhMw/exec";

    async function fetchStudents() {
        const cid = document.getElementById('classId').value;
        const sid = document.getElementById('studentId');
        if(!cid) return;
        sid.innerHTML = "<option>Loading...</option>";
        
        try {
            const res = await fetch(`${SCRIPT_URL}?classId=${cid}`);
            const data = await res.json();
            sid.innerHTML = '<option value="">-- Select Student --</option>';
            data.forEach(name => {
                sid.innerHTML += `<option value="${name}">${name}</option>`;
            });
            sid.disabled = false;
        } catch(e) { alert("Error loading students"); }
    }

    async function loadHistory() {
        const cid = document.getElementById('classId').value;
        const sname = document.getElementById('studentId').value;
        const container = document.getElementById('historyContainer');
        const loader = document.getElementById('loader');

        if(!sname) { alert("First select students!"); return; }

        container.innerHTML = "";
        loader.style.display = "block";

        try {
            const res = await fetch(`${SCRIPT_URL}?getAttendance=true&classId=${cid}&name=${encodeURIComponent(sname)}`);
            const data = await res.json();
            loader.style.display = "none";

            if(data.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:red;'>No records found.</p>";
                return;
            }

            data.forEach(row => {
                let photo = (row[6] && row[6] !== "No Photo") 
                            ? "https://lh3.googleusercontent.com/d/" + row[6] 
                            : "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                
                let outTime = (row[2] === "Inside") ? "Present in the School" : row[2];

                container.innerHTML += `
                    <div class="history-card">
                        <div class="details">
                            <p><b>Check-In:</b> ${row[1]}</p>
                            <p><b>Check-Out:</b> ${outTime}</p>
                        </div>
                        <div class="photo-box">
                            <img src="${photo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                        </div>
                    </div>
                `;
            });
        } catch(e) { 
            loader.style.display = "none";
            alert("Connection error!"); 
        }
    }
</script>
</body>
</html>
